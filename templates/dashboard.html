<!DOCTYPE html>
<html>
<head>

<title>Admin Dashboard</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

</head>

<body class="bg-light">

<div class="container mt-5">

<h1 class="text-center mb-4">Internship Tracking System</h1>

<div class="row">

<div class="col-md-4">
<div class="card text-center shadow">
<div class="card-body">
<h5 class="card-title">Total Students</h5>
<h2>{{ total_students }}</h2>
</div>
</div>
</div>

<div class="col-md-4">
<div class="card text-center shadow">
<div class="card-body">
<h5 class="card-title">Total Internships</h5>
<h2>{{ total_internships }}</h2>
</div>
</div>
</div>

<div class="col-md-4">
<div class="card text-center shadow">
<div class="card-body">
<h5 class="card-title">Total Feedback</h5>
<h2>{{ total_feedback }}</h2>
</div>
</div>
</div>

</div>

<hr class="my-4">

<div class="text-center">

<a href="/students" class="btn btn-primary m-2">Manage Students</a>

<a href="/internship" class="btn btn-success m-2">Manage Internships</a>

<a href="/feedback" class="btn btn-warning m-2">Manage Feedback</a>

</div>

</div>

</body>
</html>
